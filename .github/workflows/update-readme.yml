name: Update Profile README

on:
  schedule:
    - cron: '0 3 * * *'   # Runs daily at 03:00 UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  update-activity:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate recent activity & top repos
        uses: actions/github-script@v9
        id: generate
        env:
          USERNAME: ${{ github.repository_owner }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const username = process.env.USERNAME;
            const sections = [];

            // --- Recent Activity ---
            const events = await github.rest.activity.listPublicEventsForUser({
              username: username,
              per_page: 30
            });

            const activityLines = [];
            const seenRepos = new Set();
            for (const event of events.data) {
              const repoFullName = event.repo.name;
              const repo = repoFullName.split('/').pop();
              const type = event.type;

              if (activityLines.length >= 8) break;

              if (type === 'PushEvent') {
                const commits = event.payload.commits || [];
                // Show actual commit messages, up to 2 per event
                for (const c of commits.slice(0, 2)) {
                  if (activityLines.length >= 8) break;
                  const msg = c.message.split('\n')[0];
                  if (!msg) continue;
                  const shortMsg = msg.length > 50 ? msg.slice(0, 47) + '…' : msg;
                  activityLines.push(`- 📝 \`${shortMsg}\` → [${repo}](https://github.com/${repoFullName})`);
                }
                seenRepos.add(repoFullName);
              } else if (type === 'IssuesEvent' && !seenRepos.has(repoFullName)) {
                const title = event.payload.issue?.title || 'an issue';
                const url = event.payload.issue?.html_url || '#';
                const shortTitle = title.length > 50 ? title.slice(0, 47) + '…' : title;
                activityLines.push(`- 🐛 ${event.payload.action} issue [${shortTitle}](${url})`);
                seenRepos.add(repoFullName);
              } else if (type === 'PullRequestEvent' && !seenRepos.has(repoFullName)) {
                const title = event.payload.pull_request?.title || 'a PR';
                const url = event.payload.pull_request?.html_url || '#';
                const shortTitle = title.length > 50 ? title.slice(0, 47) + '…' : title;
                activityLines.push(`- 🔀 ${event.payload.action} PR [${shortTitle}](${url})`);
                seenRepos.add(repoFullName);
              } else if (type === 'WatchEvent' && !seenRepos.has(repoFullName)) {
                activityLines.push(`- ⭐ Starred [${repo}](https://github.com/${repoFullName})`);
                seenRepos.add(repoFullName);
              } else if (type === 'CreateEvent' && event.payload.ref_type === 'repository' && !seenRepos.has(repoFullName)) {
                activityLines.push(`- 🆕 Created [${repo}](https://github.com/${repoFullName})`);
                seenRepos.add(repoFullName);
              }
            }
            sections.push('### 🕐 Recent Activity\n' + (activityLines.length > 0 ? activityLines.join('\n') : '- *No recent public activity*'));

            // --- Top Repos (by stars, forks) ---
            let allRepos = [];
            let page = 1;
            while (true) {
              const resp = await github.rest.repos.listForUser({
                username: username,
                sort: 'updated',
                direction: 'desc',
                per_page: 100,
                page: page,
                type: 'owner'
              });
              allRepos = allRepos.concat(resp.data);
              if (resp.data.length < 100) break;
              page++;
            }

            const scored = allRepos
              .filter(r => !r.fork && r.name !== username)
              .map(r => ({
                name: r.name,
                desc: r.description || '',
                url: r.html_url,
                stars: r.stargazers_count,
                forks: r.forks_count,
                lang: r.language
              }))
              .sort((a, b) => (b.stars * 3 + b.forks) - (a.stars * 3 + a.forks))
              .slice(0, 6);

            const repoLines = scored.map(r => {
              const parts = [`**[${r.name}](${r.url})**`];
              if (r.lang) parts.push(`\`${r.lang}\``);
              if (r.stars > 0) parts.push(`⭐ ${r.stars}`);
              if (r.forks > 0) parts.push(`🍴 ${r.forks}`);
              // Only add description if it exists and is meaningful
              if (r.desc) {
                const shortDesc = r.desc.length > 55 ? r.desc.slice(0, 52) + '…' : r.desc;
                parts.push(`— ${shortDesc}`);
              }
              return '- ' + parts.join(' ');
            });
            sections.push('### 🏆 Top Repos\n' + (repoLines.length > 0 ? repoLines.join('\n') : '- *No repos yet*'));

            return sections.join('\n\n');

      - name: Update README
        run: |
          python3 << 'PYEOF'
          import os, json

          readme = open('README.md', 'r').read()
          raw = os.environ['ACTIVITY']
          activity = json.loads(raw) if raw.startswith('"') else raw
          if isinstance(activity, str) and activity.startswith('"'):
              activity = json.loads(activity)

          start = '<!-- RECENT_ACTIVITY:START -->'
          end = '<!-- RECENT_ACTIVITY:END -->'

          si = readme.find(start)
          ei = readme.find(end)

          if si != -1 and ei != -1:
              readme = readme[:si + len(start)] + '\n' + activity + '\n' + readme[ei:]
              open('README.md', 'w').write(readme)
              print('README updated')
          else:
              print('Markers not found')
          PYEOF
        env:
          ACTIVITY: ${{ steps.generate.outputs.result }}

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes" || (git commit -m "🔄 Update profile activity & top repos" && git push)
